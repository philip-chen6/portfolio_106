<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link
      href="https://cdn.jsdelivr.net/npm/mapbox-gl@1.13.3/dist/mapbox-gl.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="map.css" />
    <script src="map.js" type="module"></script>
  </head>
  <body>
    <header>
      <div>
        <h1>Bikewatching</h1>
        <p>Boston-area bike traffic by station, time, and direction.</p>
      </div>
      <label class="time-filter">
        Filter by time:
        <input id="time-slider" type="range" min="-1" max="1440" value="-1" />
        <time id="selected-time"></time>
        <em id="any-time">(any time)</em>
      </label>
    </header>

    <div class="map-wrapper">
      <div id="map"></div>
      <svg></svg>
    </div>

    <div class="legend">
      <div style="--departure-ratio: 1">More departures</div>
      <div style="--departure-ratio: 0.5">Balanced</div>
      <div style="--departure-ratio: 0">More arrivals</div>
    </div>
  </body>
</html>
